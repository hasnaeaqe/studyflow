<div class="app-container">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="logo-text">StudyFlow</span>
    </div>

    <div class="admin-pill">
      <div class="pill-dot"></div>
      <span class="pill-text">Administration</span>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Principal</div>
      <a class="nav-item" [class.active]="isActive('/admin/dashboard')" routerLink="/admin/dashboard">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
        Vue d'ensemble
      </a>
      <a class="nav-item" routerLink="/admin/users" routerLinkActive="active">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        Utilisateurs
      </a>
      <a class="nav-item" routerLink="/admin/sessions" routerLinkActive="active">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        Sessions globales
      </a>
     <a class="nav-item" routerLink="/admin/groups" routerLinkActive="active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        Groupes d'étude
      </a>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Analytique</div>
      <a class="nav-item" routerLink="/admin/logs" routerLinkActive="active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </span>
        Journal système
      </a>
      <a class="nav-item" routerLink="/admin/productivity" routerLinkActive="active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </span>
        Statistiques
      </a>
      <a class="nav-item" routerLink="/admin/notifications" routerLinkActive="active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </span>
        Notifications
        <span class="nav-badge amber">{{unreadCount}}</span>
      </a>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Système</div>
      <a class="nav-item" routerLink="/admin/profile" routerLinkActive="active">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg></span>
        Paramètres
      </a>
      <a class="nav-item" (click)="logout()" style="cursor:pointer">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        Déconnexion
      </a>
    </div>

    <!-- ⭐ PARTIE DYNAMIQUE MODIFIÉE ⭐ -->
    <div class="sidebar-user" *ngIf="currentUser">
      <div class="user-av">{{ userInitials }}</div>
      <div class="user-info">
        <div class="uname">{{ userFullName }}</div>
        <div class="uemail">{{ currentUser.email }}</div>
      </div>
    </div>

    <div class="sidebar-user" *ngIf="!currentUser">
      <div class="user-av">?</div>
      <div class="user-info">
        <div class="uname">Chargement...</div>
        <div class="uemail">---</div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
