<div class="auth-container">
  <div class="auth-glow"></div>
  
  <div class="auth-card">
    <a routerLink="/landing" class="back-home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Retour à l'accueil
    </a>

    <div class="auth-header">
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        StudyFlow
      </div>
      <h1>Créer un compte</h1>
      <p>Rejoignez la communauté StudyFlow</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input 
            type="text" 
            [(ngModel)]="registerData.firstName" 
            name="firstName"
            class="form-control" 
            placeholder="Votre prénom"
            required>
        </div>

        <div class="form-group">
          <label>Nom</label>
          <input 
            type="text" 
            [(ngModel)]="registerData.lastName" 
            name="lastName"
            class="form-control" 
            placeholder="Votre nom"
            required>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          [(ngModel)]="registerData.email" 
          name="email"
          class="form-control" 
          placeholder="exemple@etudiant.ma"
          required>
      </div>

      <div class="form-group">
        <label>Rôle</label>
        <select [(ngModel)]="registerData.role" name="role" class="form-control">
          <option value="user">Étudiant</option>
          <option value="admin">Administrateur</option>
        </select>
        <small class="form-hint">Choisissez votre rôle sur la plateforme</small>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input 
          type="password" 
          [(ngModel)]="registerData.password" 
          name="password"
          class="form-control" 
          placeholder="••••••••"
          required>
        <small class="form-hint">Minimum 6 caractères</small>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input 
          type="password" 
          [(ngModel)]="registerData.confirmPassword" 
          name="confirmPassword"
          class="form-control" 
          placeholder="••••••••"
          required>
      </div>


      <label class="checkbox terms">
        <input type="checkbox" [(ngModel)]="registerData.acceptTerms" name="acceptTerms">
        <span>J'accepte les <a href="#" (click)="$event.preventDefault()">conditions d'utilisation</a></span>
      </label>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Créer mon compte gratuit</span>
        <span *ngIf="isLoading">Inscription en cours...</span>
      </button>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-message" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>
    </form>

    <div class="auth-footer">
      <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
    </div>
  </div>
</div>
